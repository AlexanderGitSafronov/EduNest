<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <rect width="512" height="240" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Graduation cap (mortarboard) -->
  <!-- Cap board diamond -->
  <g transform="translate(256, 185)">
    <polygon points="0,-72 90,0 0,72 -90,0" fill="white" opacity="0.95"/>
    <!-- Cap brim -->
    <rect x="-110" y="-18" width="220" height="36" rx="6" fill="white" opacity="0.9"/>
  </g>

  <!-- Diploma/book shape -->
  <rect x="150" y="280" width="212" height="140" rx="18" fill="white" opacity="0.92"/>

  <!-- Book lines -->
  <rect x="181" y="315" width="150" height="12" rx="6" fill="#6366f1" opacity="0.7"/>
  <rect x="181" y="340" width="120" height="10" rx="5" fill="#7c3aed" opacity="0.6"/>
  <rect x="181" y="362" width="138" height="10" rx="5" fill="#7c3aed" opacity="0.55"/>

  <!-- Tassel string -->
  <line x1="346" y1="185" x2="346" y2="245" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel end -->
  <circle cx="346" cy="258" r="15" fill="white" opacity="0.9"/>

  <!-- EN monogram removed - using icon only for cleanliness -->
</svg>
